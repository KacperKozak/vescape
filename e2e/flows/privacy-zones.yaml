appId: app.vescape
---
- runFlow: _launch.yaml
- openLink: 'vescape://e2e-seed?flow=privacy-zones'
- extendedWaitUntil:
    visible: E2E Privacy Board
    timeout: 15000

- openLink: 'vescape://settings/privacy-zones'
- extendedWaitUntil:
    visible:
      id: privacy-zone-pill-e2e-office
    timeout: 15000

# Toggle the seeded zone on and off.
- tapOn:
    id: privacy-zone-pill-e2e-office
- extendedWaitUntil:
    visible:
      id: privacy-zone-toggle-button
      text: Enable
    timeout: 5000
- tapOn:
    id: privacy-zone-toggle-button
- extendedWaitUntil:
    visible:
      id: privacy-zone-toggle-button
      text: Disable
    timeout: 5000
- tapOn:
    id: privacy-zone-toggle-button
- extendedWaitUntil:
    visible:
      id: privacy-zone-toggle-button
      text: Enable
    timeout: 5000

# Rename the zone via the long-press menu.
- longPressOn:
    id: privacy-zone-pill-e2e-office
- extendedWaitUntil:
    visible:
      id: privacy-zone-menu-rename-e2e-office
    timeout: 5000
- tapOn:
    id: privacy-zone-menu-rename-e2e-office
- extendedWaitUntil:
    visible:
      id: privacy-zone-rename-input
    timeout: 5000
- tapOn:
    id: privacy-zone-rename-input
- eraseText: 10
- inputText: 'HQ'
- tapOn:
    id: privacy-zone-rename-save-button
- extendedWaitUntil:
    visible:
      id: privacy-zone-pill-e2e-office
      text: HQ
    timeout: 5000

# Delete the zone via the long-press menu.
- longPressOn:
    id: privacy-zone-pill-e2e-office
- extendedWaitUntil:
    visible:
      id: privacy-zone-menu-delete-e2e-office
    timeout: 5000
- tapOn:
    id: privacy-zone-menu-delete-e2e-office
- extendedWaitUntil:
    visible: Delete zone
    timeout: 5000
- tapOn: Delete
- extendedWaitUntil:
    notVisible:
      id: privacy-zone-pill-e2e-office
    timeout: 5000

# Add a new custom zone from scratch.
- tapOn:
    id: privacy-zone-add-button
- extendedWaitUntil:
    visible:
      id: privacy-zone-name-input
    timeout: 5000
- tapOn:
    id: privacy-zone-name-input
- inputText: 'Gym'
- tapOn:
    id: privacy-zone-name-add-button
- extendedWaitUntil:
    visible: Gym
    timeout: 5000
- tapOn:
    id: privacy-zone-save-button
- extendedWaitUntil:
    notVisible:
      id: privacy-zone-save-button
    timeout: 5000
- assertVisible:
    id: privacy-zone-toggle-button
    text: Disable
