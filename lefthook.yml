output:
  - failure

post-merge:
  commands:
    install:
      glob: 'bun.lockb'
      run: bun install

pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{ts,tsx,json,md,yml,yaml}'
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    skills-check:
      glob: '{.agents,.claude}/skills/**'
      run: bun run skills-check
      stage_fixed: true
    typecheck:
      glob: '*.{ts,tsx}'
      run: bun run ts
    lint:
      glob: '*.{ts,tsx,json}'
      run: bun run lint
    knip:
      glob: '*.{ts,tsx,json}'
      run: bun knip
    test-bun:
      glob: '*.{ts,tsx}'
      run: bun run test:bun
    test-android:
      glob: '*.{kt,kts}'
      run: bun run test:android
