output:
  - failure

pre-commit:
  parallel: true
  commands:
    format:
      glob: '*.{js,jsx,ts,tsx,json}'
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    typecheck:
      glob: '*.{js,jsx,ts,tsx}'
      run: bun run ts
    lint:
      glob: '*.{js,jsx,ts,tsx,json}'
      run: bun run lint
    knip:
      run: bun knip
    test-bun:
      glob: '*.{js,jsx,ts,tsx}'
      run: bun run test:bun
    test-android:
      glob: 'modules/vesc-ble/android/**/*.{kt,kts}'
      run: bun run test:android
